<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Noble Knight OS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BOOT -->
<div id="bootScreen">
  <div id="bootText"></div>
</div>

<!-- LOGIN -->
<div id="loginScreen" style="display:none;">
  <h2>ACCESS REQUIRED</h2>
  <input id="passwordInput" placeholder="enter password">
</div>

<!-- GAME -->
<div id="gameScreen" style="display:none;">

  <div id="terminal"></div>

  <input id="commandInput" placeholder="type command...">

  <div id="hackBarContainer">
    <div id="hackBar"></div>
  </div>

  <div id="corruption">System Corruption: 0%</div>

</div>

<!-- AUDIO -->
<audio id="errorSound" src="sounds/error.mp3"></audio>
<audio id="hackSound" src="sounds/hack.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
